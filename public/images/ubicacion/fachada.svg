<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="El Bar de Eric">
  <!-- PLACEHOLDER: reemplazar por imagen real de Eric / del bar en preproducción -->
  
  <defs>
    <radialGradient id="vig-fachada" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <filter id="grain-fachada">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#vig-fachada)"/>
  <rect width="1200" height="800" filter="url(#grain-fachada)" opacity="0.5"/>
  <rect x="72" y="48" width="1056" height="704" fill="none" stroke="#FFD700" stroke-opacity="0.25" stroke-width="4.8"/>
  <g transform="translate(288, 56) scale(6.24)" opacity="0.85">
    <g fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round">
      <path d="M38 30 h24 l-3 14 a9 9 0 0 1 -18 0 z"/>
      <line x1="50" y1="53" x2="50" y2="70"/><line x1="42" y1="70" x2="58" y2="70"/>
    </g></g>
  <text x="600" y="656" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="60" fill="#ededed">El Bar de Eric</text>
  <text x="600" y="704" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="38.4" fill="#9CA3AF">Calle Escuelas 8, Granada</text>
</svg>
