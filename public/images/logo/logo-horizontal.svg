<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="El Bar de Eric">
  <rect width="1200" height="400" fill="#1a1a1a"/>
  <!-- Drum kit icon -->
  <g transform="translate(130 190)" fill="none" stroke="#FFD700" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="0" cy="25" rx="45" ry="40"/>
    <ellipse cx="-60" cy="-15" rx="20" ry="5"/>
    <line x1="-60" y1="-10" x2="-60" y2="25"/>
    <ellipse cx="60" cy="-20" rx="22" ry="5"/>
    <line x1="60" y1="-15" x2="60" y2="25"/>
    <ellipse cx="-30" cy="8" rx="18" ry="9"/>
    <ellipse cx="30" cy="5" rx="18" ry="9"/>
    <line x1="-25" y1="-42" x2="12" y2="-8" stroke-width="5"/>
    <line x1="25" y1="-42" x2="-12" y2="-8" stroke-width="5"/>
    <circle cx="-25" cy="-42" r="4" fill="#FFD700"/>
    <circle cx="25" cy="-42" r="4" fill="#FFD700"/>
  </g>
  <!-- Title -->
  <text x="260" y="195" font-family="Georgia, 'Playfair Display', serif" font-weight="700" font-size="88" fill="#FFD700">El Bar de Eric</text>
  <!-- Tagline -->
  <text x="262" y="255" font-family="Inter, Arial, sans-serif" font-size="32" letter-spacing="2" fill="#ededed">Donde la música se hace tapa</text>
  <!-- Red accent line -->
  <rect x="262" y="280" width="100" height="5" rx="2" fill="#8B0000"/>
  <!-- Location -->
  <text x="262" y="320" font-family="Inter, Arial, sans-serif" font-size="20" letter-spacing="3" fill="#9CA3AF">GRANADA · DESDE 2013</text>
</svg>
