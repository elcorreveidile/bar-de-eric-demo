<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000" role="img" aria-label="Eric Jiménez">
  <!-- PLACEHOLDER: reemplazar por imagen real de Eric / del bar en preproducción -->
  
  <defs>
    <radialGradient id="vig-eric" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <filter id="grain-eric">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#vig-eric)"/>
  <rect width="800" height="1000" filter="url(#grain-eric)" opacity="0.5"/>
  <rect x="48" y="60" width="704" height="880" fill="none" stroke="#E8313F" stroke-opacity="0.25" stroke-width="3.2"/>
  <g transform="translate(88, 148) scale(6.24)" opacity="0.85">
    <g fill="none" stroke="#E8313F" stroke-width="2" stroke-linecap="round">
      <ellipse cx="50" cy="62" rx="22" ry="7"/>
      <line x1="34" y1="62" x2="30" y2="80"/><line x1="66" y1="62" x2="70" y2="80"/>
      <circle cx="34" cy="46" r="9"/><circle cx="66" cy="46" r="9"/>
      <line x1="40" y1="40" x2="58" y2="34"/><line x1="60" y1="40" x2="42" y2="34"/>
    </g></g>
  <text x="400" y="820" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="40" fill="#ededed">Eric Jiménez</text>
  <text x="400" y="880" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25.6" fill="#9CA3AF">batería</text>
</svg>
